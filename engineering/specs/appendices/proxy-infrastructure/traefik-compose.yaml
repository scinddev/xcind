# Generated by: xcind-proxy init
# This file is managed by Xcind. Manual edits will be overwritten on re-init.
#
# Location: $XCIND_PROXY_STATE_DIR/compose.yaml
#   Default: ~/.local/state/xcind/proxy/compose.yaml
#
# Variables are expanded from $XCIND_PROXY_CONFIG_DIR/config.sh at generation time.
# TLS-conditional lines (marked below) are omitted when XCIND_PROXY_TLS_MODE=disabled.

name: xcind-proxy

services:
  traefik:
    image: traefik:v3                    # From XCIND_PROXY_IMAGE
    command:
      - "--configFile=/etc/traefik/traefik.yaml"
      # When XCIND_PROXY_DASHBOARD=true:
      # - "--api.dashboard=true"
    ports:
      - "80:80"                          # From XCIND_PROXY_HTTP_PORT
      - "443:443"                        # From XCIND_PROXY_HTTPS_PORT (TLS only)
      # When XCIND_PROXY_DASHBOARD=true:
      # - "8080:8080"                    # From XCIND_PROXY_DASHBOARD_PORT
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./dynamic:/etc/traefik/dynamic:ro   # TLS only
      - ./certs:/etc/traefik/certs:ro       # TLS only
    networks:
      - xcind-proxy
    restart: unless-stopped
    labels:
      - "xcind.managed=true"
      - "xcind.component=proxy"

networks:
  xcind-proxy:
    external: true
