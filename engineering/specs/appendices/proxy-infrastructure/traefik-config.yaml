# Traefik Static Configuration
#
# This file is generated by `xcind-proxy init` and placed at:
#   $XCIND_PROXY_STATE_DIR/traefik.yaml
#   Default: ~/.local/state/xcind/proxy/traefik.yaml
#
# TLS-conditional sections (marked below) are omitted when
# XCIND_PROXY_TLS_MODE=disabled.

# Base configuration (always generated):

entryPoints:
  web:
    address: ":80"
  websecure:              # TLS only (XCIND_PROXY_TLS_MODE != disabled)
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: xcind-proxy
  file:                   # TLS only
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

# When XCIND_PROXY_DASHBOARD=true, the following is appended:
#
# api:
#   dashboard: true
#   insecure: true
