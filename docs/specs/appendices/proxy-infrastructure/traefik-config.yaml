# Traefik Static Configuration
#
# This file is generated by `xcind-proxy init` and placed at:
# ~/.config/xcind/proxy/traefik.yaml
#
# Base configuration (always generated):

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    exposedByDefault: false
    network: xcind-proxy

log:
  level: INFO

# When XCIND_PROXY_DASHBOARD=true, the following is appended:
#
# api:
#   dashboard: true
#   insecure: true
