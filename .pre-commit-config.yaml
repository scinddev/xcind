repos:
  # -- Secrets --
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.3
    hooks:
      - id: gitleaks

  # -- Formatters (run first) --
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt

  # -- Manifest consistency --
  - repo: local
    hooks:
      - id: check-file-manifest
        name: check installed-file manifests are in sync
        entry: contrib/check-file-manifest
        language: script
        pass_filenames: false
        files: ^(bin/|lib/xcind/|install\.sh|uninstall\.sh|package\.json|flake\.nix|contrib/test-all|contrib/check-file-manifest|\.github/workflows/tests\.yml)

  # -- Linters (run after formatters) --
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
        exclude: ^\.envrc$
